<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明代鄉會試《春秋》義題目資料庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f7f5;
  --bg-card: #ffffff;
  --bg-elevated: #f0f5f2;
  --bg-hover: #e8f0eb;
  --border: #d4ddd8;
  --border-light: #e2ebe6;
  --text: #1a2e23;
  --text-sec: #4a6355;
  --text-dim: #8a9e92;
  --accent: #2d8a56;
  --accent-light: #3aaa6b;
  --accent-dark: #1e6b3f;
  --accent-glow: rgba(45,138,86,0.15);
  --accent-bg: rgba(45,138,86,0.06);
  --indigo: #5b6abf;
  --amber: #d4950a;
  --rose: #c94a5e;
  --sky: #3a8fc2;
  --orange: #c67320;
  --pink: #b5508a;
  --teal: #28917a;
  --red: #c93d3d;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 3px rgba(30,60,40,0.06);
  --shadow-md: 0 4px 16px rgba(30,60,40,0.08);
  --shadow-lg: 0 8px 32px rgba(30,60,40,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; }

/* ===== HERO HEADER ===== */
.hero {
  position: relative; padding: 3rem 1.5rem 4.5rem; text-align: center;
  background: linear-gradient(160deg, #1e6b3f 0%, #2d8a56 40%, #3aaa6b 100%);
  overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(0,0,0,0.08) 0%, transparent 50%);
  pointer-events: none;
}
.hero::after {
  content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 40px;
  background: var(--bg); border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}
.hero h1 {
  position: relative; font-size: 2rem; font-weight: 700; letter-spacing: 0.12em;
  color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.hero .subtitle { position: relative; font-size: 0.85rem; color: rgba(255,255,255,0.7); margin-top: 0.4rem; letter-spacing: 0.08em; font-weight: 300; }
.hero .total-badge {
  position: relative; display: inline-flex; align-items: center; gap: 0.5rem;
  margin-top: 0.6rem; padding: 0.5rem 1.5rem; border-radius: 50px;
  background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25);
  font-size: 0.9rem; color: rgba(255,255,255,0.9); backdrop-filter: blur(4px);
}
.hero .total-badge .big { font-size: 1.4rem; font-weight: 700; color: #fff; }

/* ===== STATS CHIPS ===== */
.stats-scroll { padding: 1.2rem 1rem 0.6rem; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
.stats-scroll::-webkit-scrollbar { display: none; }
.stat-chip {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.5rem 1rem; margin-right: 0.5rem; border-radius: 50px;
  background: var(--bg-card); border: 1px solid var(--border-light);
  font-size: 0.82rem; color: var(--text-sec); cursor: pointer;
  transition: all 0.2s; white-space: nowrap; box-shadow: var(--shadow-sm);
}
.stat-chip:hover { border-color: var(--accent); color: var(--accent); }
.stat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px var(--accent-glow); }
.stat-chip .chip-num { font-weight: 700; color: var(--text); font-size: 0.9rem; }
.stat-chip.active .chip-num { color: #fff; }
.stat-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ===== MAIN CONTAINER ===== */
.container { max-width: 1260px; margin: 0 auto; padding: 0 1rem 3rem; }

/* ===== TOOLBAR ===== */
.toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; padding: 0 0.2rem; }
.toolbar .btn {
  padding: 0.45rem 0.9rem; border-radius: 50px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-sec); font-size: 0.8rem;
  cursor: pointer; font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem;
  box-shadow: var(--shadow-sm);
}
.toolbar .btn:hover { border-color: var(--accent); color: var(--accent); }
.toolbar .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar .btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
.toolbar .btn-success { background: var(--teal); color: #fff; border-color: var(--teal); font-weight: 600; }
.unsaved-badge { display: none; background: var(--amber); color: #fff; font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 50px; font-weight: 600; margin-left: 0.2rem; }
.unsaved-badge.show { display: inline; }

/* ===== SEARCH & FILTERS ===== */
.search-bar {
  position: relative; margin-bottom: 1.2rem;
  background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius);
  padding: 0.8rem 1rem; display: flex; flex-wrap: wrap; gap: 0.7rem; align-items: center;
  transition: all 0.2s; box-shadow: var(--shadow-sm);
}
.search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-sm); }
.search-input-wrap { flex: 1; min-width: 200px; position: relative; }
.search-input-wrap input {
  width: 100%; background: transparent; border: none; color: var(--text);
  font-size: 0.95rem; font-family: inherit; outline: none; padding: 0.3rem 0 0.3rem 1.8rem;
}
.search-input-wrap input::placeholder { color: var(--text-dim); }
.search-input-wrap .search-icon { position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 1.1rem; }
.filter-select {
  background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-sec);
  padding: 0.4rem 0.7rem; border-radius: 50px; font-size: 0.82rem; font-family: inherit;
  cursor: pointer; outline: none; transition: all 0.2s;
}
.filter-select:focus { border-color: var(--accent); }
.filter-select option { background: var(--bg-card); color: var(--text); }
.result-count { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; }

/* ===== SORT BAR ===== */
.sort-bar { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 1rem; padding: 0 0.2rem; flex-wrap: wrap; }
.sort-bar .label { font-size: 0.78rem; color: var(--text-dim); margin-right: 0.2rem; }
.sort-btn {
  padding: 0.3rem 0.7rem; border-radius: 50px; border: 1px solid transparent;
  background: transparent; color: var(--text-dim); font-size: 0.78rem; font-family: inherit;
  cursor: pointer; transition: all 0.15s;
}
.sort-btn:hover { color: var(--text-sec); background: var(--bg-elevated); }
.sort-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--border); font-weight: 600; }

/* ===== GROUP / CARD GRID ===== */
.exam-group { margin-bottom: 1rem; }
.group-header {
  display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 1rem;
  background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius);
  cursor: pointer; user-select: none; transition: all 0.2s; box-shadow: var(--shadow-sm);
}
.group-header:hover { border-color: var(--accent); }
.group-header .group-arrow {
  font-size: 0.7rem; color: var(--text-dim); transition: transform 0.2s; flex-shrink: 0;
}
.group-header.collapsed .group-arrow { transform: rotate(-90deg); }
.group-header .group-title { font-weight: 600; font-size: 0.95rem; color: var(--text); }
.group-header .group-count {
  font-size: 0.75rem; color: var(--text-dim); background: var(--bg-elevated);
  padding: 0.1rem 0.5rem; border-radius: 50px; margin-left: auto;
}
.group-body {
  display: flex; flex-wrap: wrap; gap: 0.6rem;
  margin-top: 0.6rem;
  max-height: 2000px; overflow: hidden; transition: max-height 0.3s ease, margin 0.3s ease, opacity 0.3s ease; opacity: 1;
}
.group-body .q-card { flex: 1 1 220px; max-width: calc(25% - 0.5rem); min-width: 200px; }
.group-body.collapsed { max-height: 0; margin-top: 0; opacity: 0; }
.card-grid { display: flex; flex-direction: column; gap: 0; }
@media (max-width: 900px) { .group-body .q-card { max-width: calc(50% - 0.3rem); } }
@media (max-width: 520px) { .group-body .q-card { max-width: 100%; } }

.q-card {
  background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius);
  padding: 1.1rem 1.2rem; cursor: pointer; position: relative;
  transition: all 0.2s ease; overflow: hidden; box-shadow: var(--shadow-sm);
}
.q-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  opacity: 0; transition: opacity 0.2s;
}
.q-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.q-card:hover::before { opacity: 1; }
.q-card.type-hui::before { background: linear-gradient(90deg, var(--indigo), var(--sky)); }
.q-card.type-ying::before { background: linear-gradient(90deg, var(--accent), var(--teal)); }
.q-card.type-shun::before { background: linear-gradient(90deg, var(--amber), var(--orange)); }
.q-card.type-other::before { background: linear-gradient(90deg, var(--pink), var(--rose)); }
.q-card.edited { border-left: 3px solid var(--amber); }

.q-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; }
.q-card-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.q-card-year { font-size: 1.05rem; font-weight: 600; color: var(--text); }
.q-card-seq { font-size: 0.75rem; color: var(--text-dim); background: var(--bg-elevated); padding: 0.15rem 0.5rem; border-radius: 50px; }
.q-card-source { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 0.3rem; }

.tag {
  display: inline-block; padding: 0.15rem 0.6rem; border-radius: 50px;
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap;
}
.tag-hui { background: rgba(91,106,191,0.1); color: var(--indigo); }
.tag-ying { background: rgba(45,138,86,0.1); color: var(--accent); }
.tag-shun { background: rgba(212,149,10,0.1); color: var(--amber); }
.tag-other { background: rgba(181,80,138,0.1); color: var(--pink); }

.q-card-stocks { display: flex; flex-direction: column; gap: 0.3rem; }
.stock-line { display: flex; gap: 0.4rem; align-items: baseline; line-height: 1.5; }
.stock-duke { font-size: 0.75rem; color: var(--rose); font-weight: 500; white-space: nowrap; padding: 0.05rem 0.35rem; background: rgba(201,74,94,0.06); border-radius: 4px; }
.stock-txt { font-size: 0.85rem; color: var(--text-sec); }
.stock-more { font-size: 0.75rem; color: var(--text-dim); padding-left: 0.3rem; }

.q-card-actions {
  position: absolute; top: 0.8rem; right: 0.8rem; display: flex; gap: 0.25rem;
  opacity: 0; transition: opacity 0.15s;
}
.q-card:hover .q-card-actions { opacity: 1; }
.q-card-actions button {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
  padding: 0.2rem 0.45rem; font-size: 0.72rem; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s; font-family: inherit; box-shadow: var(--shadow-sm);
}
.q-card-actions button:hover { color: var(--accent); border-color: var(--accent); }
.q-card-actions .del-btn:hover { color: var(--red); border-color: var(--red); }

/* ===== PAGINATION ===== */
.pagination { display: flex; justify-content: center; align-items: center; gap: 0.3rem; margin-top: 1.5rem; flex-wrap: wrap; }
.pagination button {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-sec); cursor: pointer; font-family: inherit;
  font-size: 0.82rem; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
}
.pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.pagination button:disabled { opacity: 0.3; cursor: default; }
.pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px var(--accent-glow); }
.pagination .page-info { font-size: 0.78rem; color: var(--text-dim); margin: 0 0.3rem; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(30,60,40,0.3);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  z-index: 100; justify-content: center; align-items: flex-start; padding: 3vh 1rem; overflow-y: auto;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 18px;
  max-width: 720px; width: 100%; padding: 1.8rem; margin: auto;
  box-shadow: var(--shadow-lg); animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:none; } }
.modal h2 { font-size: 1.15rem; color: var(--accent-dark); margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border-light); }
.detail-meta { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.2rem; }
.detail-meta span { font-size: 0.88rem; }
.detail-meta .key { color: var(--text-dim); }
.stock-detail-row { display: flex; gap: 0.8rem; padding: 0.7rem 0; border-bottom: 1px solid var(--border-light); align-items: baseline; }
.stock-detail-row:last-child { border-bottom: none; }
.stock-num { font-size: 0.8rem; color: var(--rose); font-weight: 600; white-space: nowrap; min-width: 3rem; }
.stock-info { flex: 1; }
.stock-info .code-line { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.15rem; }
.stock-info .text-line { font-size: 1rem; color: var(--text); line-height: 1.8; }

/* ===== FORM ===== */
.form-group { margin-bottom: 0.8rem; }
.form-group label { display: block; font-size: 0.82rem; color: var(--text-dim); margin-bottom: 0.2rem; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 0.5rem 0.7rem; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 0.9rem; font-family: inherit; outline: none; background: var(--bg); color: var(--text);
  transition: all 0.2s;
}
.form-group input::placeholder, .form-group textarea::placeholder { color: var(--text-dim); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-group select option { background: var(--bg-card); color: var(--text); }
.form-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
.form-row .form-group { flex: 1; min-width: 120px; }
.stock-editor { border: 1px solid var(--border-light); border-radius: 10px; padding: 0.8rem; margin-bottom: 0.6rem; background: var(--bg-elevated); }
.stock-editor .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.stock-editor .stock-header span { font-weight: 600; font-size: 0.9rem; color: var(--accent); }
.stock-editor .remove-stock { font-size: 0.8rem; color: var(--red); cursor: pointer; border: none; background: none; font-family: inherit; }
.stock-editor .remove-stock:hover { text-decoration: underline; }

.form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.2rem; padding-top: 0.8rem; border-top: 1px solid var(--border-light); }
.btn {
  padding: 0.5rem 1.1rem; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-sec); font-size: 0.85rem; font-family: inherit;
  cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
.btn-success { background: var(--teal); color: #fff; border-color: var(--teal); }
.btn-danger { background: var(--red); color: #fff; border-color: var(--red); }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.7rem 1.3rem;
  background: var(--accent); color: #fff; border-radius: 50px; font-size: 0.88rem;
  z-index: 200; opacity: 0; transform: translateY(10px);
  transition: all 0.3s; box-shadow: 0 4px 16px var(--accent-glow);
}
.toast.show { opacity: 1; transform: none; }

/* ===== FOOTER ===== */
footer { text-align: center; padding: 2rem 1rem; color: var(--text-dim); font-size: 0.78rem; border-top: 1px solid var(--border-light); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.4rem; }
  .card-grid { grid-template-columns: 1fr; }
  .toolbar { gap: 0.3rem; }
  .toolbar .btn { font-size: 0.75rem; padding: 0.35rem 0.65rem; }
  .form-row { flex-direction: column; }
  .q-card-actions { opacity: 1; }
}
@media (max-width: 480px) {
  .card-grid { grid-template-columns: 1fr; gap: 0.6rem; }
  .q-card { padding: 0.9rem 1rem; }
}

/* File input hidden */
#import-file { display: none; }
</style>
</head>
<body>

<div class="hero">
  <h1>明代鄉會試《春秋》義題目資料庫</h1>
  <div class="subtitle">Ming Dynasty Provincial & Metropolitan Examination — Chunqiu</div>
  <div class="total-badge"><span class="big" id="stat-total">-</span> 筆題目</div>
</div>

<div class="stats-scroll" id="stats-bar"></div>

<div class="container">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openAddForm()">+ 新增</button>
    <button class="btn" onclick="exportJSON()">JSON</button>
    <button class="btn" onclick="exportCSV()">CSV</button>
    <button class="btn" onclick="importJSON()">匯入</button>
    <input type="file" id="import-file" accept=".json" onchange="handleImport(event)">
    <button class="btn btn-success" id="sync-btn" onclick="syncToGitHub()" style="display:none">同步 GitHub</button>
    <span class="unsaved-badge" id="unsaved-badge">未儲存</span>
  </div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="search" placeholder="搜尋經文、試年、出處...">
    </div>
    <select class="filter-select" id="filter-type">
      <option value="">全部考試</option>
      <option value="會試">會試</option>
      <option value="應天鄉試">應天鄉試</option>
      <option value="順天鄉試">順天鄉試</option>
      <option value="浙江鄉試">浙江鄉試</option>
      <option value="江西鄉試">江西鄉試</option>
      <option value="福建鄉試">福建鄉試</option>
      <option value="湖廣鄉試">湖廣鄉試</option>
      <option value="河南鄉試">河南鄉試</option>
      <option value="山東鄉試">山東鄉試</option>
      <option value="山西鄉試">山西鄉試</option>
      <option value="陝西鄉試">陝西鄉試</option>
      <option value="四川鄉試">四川鄉試</option>
      <option value="廣東鄉試">廣東鄉試</option>
      <option value="廣西鄉試">廣西鄉試</option>
      <option value="雲貴鄉試">雲貴鄉試</option>
      <option value="雲南鄉試">雲南鄉試</option>
      <option value="貴州鄉試">貴州鄉試</option>
    </select>
    <select class="filter-select" id="filter-duke">
      <option value="">全部時代</option>
      <option value="隱公">隱公</option><option value="桓公">桓公</option>
      <option value="莊公">莊公</option><option value="閔公">閔公</option>
      <option value="僖公">僖公</option><option value="文公">文公</option>
      <option value="宣公">宣公</option><option value="成公">成公</option>
      <option value="襄公">襄公</option><option value="昭公">昭公</option>
      <option value="定公">定公</option><option value="哀公">哀公</option>
    </select>
    <span class="result-count" id="result-count"></span>
  </div>

  <div class="sort-bar">
    <span class="label">排序</span>
    <button class="sort-btn active" data-sort="id">編號</button>
    <button class="sort-btn" data-sort="examType">考試</button>
    <button class="sort-btn" data-sort="examYear">試年</button>
    <button class="sort-btn" data-sort="questionSeq">題次</button>
    <button class="sort-btn" data-sort="stockCount">股數</button>
  </div>

  <div class="card-grid" id="card-grid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast" id="toast"></div>
<footer>明代鄉會試《春秋》義題目資料庫</footer>

<script>
let DATA = [];
let filtered = [];
let sortKey = 'id';
let sortAsc = true;
let dirty = false;
const PAGE_SIZE = 60;
let currentPage = 1;

const dynastyOrder = {'洪武':1,'建文':2,'永樂':3,'洪熙':4,'宣德':5,'正統':6,'景泰':7,'天順':8,'成化':9,'弘治':10,'正德':11,'嘉靖':12,'隆慶':13,'萬曆':14,'泰昌':15,'天啟':16,'崇禎':17};
const cnNums = {'元':1,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20,'二十一':21,'二十二':22,'二十三':23,'二十四':24,'二十五':25,'二十六':26,'二十七':27,'二十八':28,'二十九':29,'三十':30,'三十一':31,'三十二':32,'三十三':33,'三十四':34,'三十五':35,'三十六':36,'三十七':37,'三十八':38,'四十':40,'四十一':41,'四十二':42,'四十三':43,'四十四':44,'四十五':45,'四十六':46,'四十七':47,'四十八':48};

const typeColors = {
  '會試': {tag:'tag-hui', card:'type-hui', dot:'var(--indigo)'},
  '應天鄉試': {tag:'tag-ying', card:'type-ying', dot:'var(--accent)'},
  '順天鄉試': {tag:'tag-shun', card:'type-shun', dot:'var(--amber)'},
};
function getTypeStyle(t) { return typeColors[t] || {tag:'tag-other', card:'type-other', dot:'var(--pink)'}; }

function yearToNum(y) {
  if (!y) return 9999;
  for (const [prefix, ord] of Object.entries(dynastyOrder)) {
    if (y.startsWith(prefix)) return ord * 100 + (cnNums[y.slice(prefix.length).replace('年','')] || 0);
  }
  return 9999;
}
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function debounce(fn, d) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), d); }; }
function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2200); }
function markDirty() { dirty = true; document.getElementById('unsaved-badge').classList.add('show'); saveToLocal(); }
function saveToLocal() { try { localStorage.setItem('chunqiu_db', JSON.stringify(DATA)); } catch(e) {} }
function loadFromLocal() { try { const s = localStorage.getItem('chunqiu_db'); return s ? JSON.parse(s) : null; } catch(e) { return null; } }

function updateStats() {
  document.getElementById('stat-total').textContent = DATA.length;
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = '';
  const counts = {};
  DATA.forEach(q => { counts[q.examType] = (counts[q.examType]||0) + 1; });
  const order = ['會試','應天鄉試','順天鄉試','浙江鄉試','江西鄉試','福建鄉試','湖廣鄉試','河南鄉試','山東鄉試','山西鄉試','陝西鄉試','四川鄉試','廣東鄉試','廣西鄉試','雲貴鄉試','雲南鄉試','貴州鄉試'];
  const allChip = document.createElement('div');
  allChip.className = 'stat-chip active';
  allChip.innerHTML = `<span class="chip-num">${DATA.length}</span> 全部`;
  allChip.onclick = () => { document.getElementById('filter-type').value = ''; applyFilters(); updateChipActive(''); };
  bar.appendChild(allChip);
  for (const t of order) {
    if (!counts[t]) continue;
    const style = getTypeStyle(t);
    const chip = document.createElement('div');
    chip.className = 'stat-chip';
    chip.dataset.type = t;
    chip.innerHTML = `<span class="chip-dot" style="background:${style.dot}"></span><span class="chip-num">${counts[t]}</span> ${t}`;
    chip.onclick = () => { document.getElementById('filter-type').value = t; applyFilters(); updateChipActive(t); };
    bar.appendChild(chip);
  }
  for (const [t, c] of Object.entries(counts)) {
    if (!order.includes(t)) {
      const style = getTypeStyle(t);
      const chip = document.createElement('div');
      chip.className = 'stat-chip';
      chip.dataset.type = t;
      chip.innerHTML = `<span class="chip-dot" style="background:${style.dot}"></span><span class="chip-num">${c}</span> ${t}`;
      chip.onclick = () => { document.getElementById('filter-type').value = t; applyFilters(); updateChipActive(t); };
      bar.appendChild(chip);
    }
  }
}

function updateChipActive(type) {
  document.querySelectorAll('.stat-chip').forEach(c => {
    c.classList.toggle('active', type === '' ? !c.dataset.type : c.dataset.type === type);
  });
}

function applyFilters(resetPage) {
  if (resetPage === undefined) resetPage = true;
  const search = document.getElementById('search').value.trim().toLowerCase();
  const fType = document.getElementById('filter-type').value;
  const fDuke = document.getElementById('filter-duke').value;
  filtered = DATA.filter(q => {
    if (fType && q.examType !== fType) return false;
    if (fDuke && !q.stocks.some(s => s.duke === fDuke)) return false;
    if (search) {
      const hay = (q.examYear + ' ' + q.fullText + ' ' + (q.source||'') + ' ' + q.stocks.map(s => (s.duke||'') + (s.year||'') + (s.text||'') + (s.code||'')).join(' ')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  applySort();
  if (resetPage) currentPage = 1;
  const tp = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage > tp) currentPage = tp || 1;
  render();
}

function applySort() {
  filtered.sort((a, b) => {
    let va, vb;
    if (sortKey === 'examYear') { va = yearToNum(a.examYear); vb = yearToNum(b.examYear); }
    else { va = a[sortKey]; vb = b[sortKey]; }
    if (va == null) va = ''; if (vb == null) vb = '';
    const cmp = typeof va === 'string' ? va.localeCompare(vb, 'zh-Hant') : va - vb;
    return sortAsc ? cmp : -cmp;
  });
}

let collapsedGroups = {};
function renderCard(q) {
  const style = getTypeStyle(q.examType);
  const edited = q._edited ? ' edited' : '';
  // Show only first stock as preview, truncated
  const s = q.stocks[0];
  let preview = '';
  if (s) {
    const duke = (s.duke && s.duke !== '?') ? `<span class="stock-duke">${esc(s.duke)}</span>` : '';
    const txt = s.text || '';
    const truncated = txt.length > 30 ? txt.substring(0, 30) + '…' : txt;
    preview = `<div class="stock-line">${duke}<span class="stock-txt">${esc(truncated)}</span></div>`;
    if (q.stocks.length > 1) preview += `<div class="stock-more">共 ${q.stockCount} 股</div>`;
  }
  return `<div class="q-card ${style.card}${edited}" onclick="showDetail(${q.id})">
    <div class="q-card-actions">
      <button onclick="event.stopPropagation();openEditForm(${q.id})">編輯</button>
      <button class="del-btn" onclick="event.stopPropagation();deleteQuestion(${q.id})">刪除</button>
    </div>
    <div class="q-card-head">
      <div class="q-card-meta">
        <span class="q-card-seq">第${q.questionSeq || '?'}題 / ${q.stockCount}股</span>
      </div>
    </div>
    ${q.source ? `<div class="q-card-source">${esc(q.source)}</div>` : ''}
    <div class="q-card-stocks">${preview}</div>
  </div>`;
}

function toggleGroup(key) {
  collapsedGroups[key] = !collapsedGroups[key];
  const header = document.querySelector(`.group-header[data-key="${key}"]`);
  const body = document.querySelector(`.group-body[data-key="${key}"]`);
  if (header) header.classList.toggle('collapsed', collapsedGroups[key]);
  if (body) body.classList.toggle('collapsed', collapsedGroups[key]);
}

function render() {
  const grid = document.getElementById('card-grid');
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);

  // Group by examType + examYear (一科)
  const groups = [];
  const groupMap = {};
  for (const q of pageData) {
    const key = q.examType + '｜' + q.examYear;
    if (!groupMap[key]) {
      groupMap[key] = { key, examType: q.examType, examYear: q.examYear, items: [] };
      groups.push(groupMap[key]);
    }
    groupMap[key].items.push(q);
  }

  let html = '';
  for (const g of groups) {
    const style = getTypeStyle(g.examType);
    const isCollapsed = collapsedGroups[g.key];
    const cardsHtml = g.items.map(q => renderCard(q)).join('');
    html += `<div class="exam-group">
      <div class="group-header${isCollapsed ? ' collapsed' : ''}" data-key="${esc(g.key)}" onclick="toggleGroup('${g.key.replace(/'/g,"\\'")}')">
        <span class="group-arrow">▼</span>
        <span class="tag ${style.tag}">${g.examType}</span>
        <span class="group-title">${esc(g.examYear)}</span>
        <span class="group-count">${g.items.length} 題</span>
      </div>
      <div class="group-body${isCollapsed ? ' collapsed' : ''}" data-key="${esc(g.key)}">
        ${cardsHtml}
      </div>
    </div>`;
  }
  grid.innerHTML = html;
  document.getElementById('result-count').textContent = `${filtered.length} / ${DATA.length}`;
  renderPagination();
}

function renderPagination() {
  const tp = Math.ceil(filtered.length / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (tp <= 1) { el.innerHTML = ''; return; }
  let html = `<button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>&#171;</button>`;
  let pages = [1]; for (let i = Math.max(2,currentPage-2); i <= Math.min(tp-1,currentPage+2); i++) pages.push(i);
  if (tp > 1) pages.push(tp); pages = [...new Set(pages)].sort((a,b)=>a-b);
  let last = 0;
  for (const p of pages) {
    if (p - last > 1) html += '<span class="page-info">...</span>';
    html += `<button onclick="goPage(${p})" class="${p===currentPage?'active':''}">${p}</button>`; last = p;
  }
  html += `<button onclick="goPage(${currentPage+1})" ${currentPage>=tp?'disabled':''}>&#187;</button>`;
  html += `<span class="page-info">${currentPage} / ${tp}</span>`;
  el.innerHTML = html;
}
function goPage(p) {
  const tp = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > tp) return; currentPage = p; render();
  document.querySelector('.card-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== Detail =====
function showDetail(id) {
  const q = DATA.find(x => x.id === id); if (!q) return;
  const style = getTypeStyle(q.examType);
  let html = `<h2>${esc(q.examYear)} ${esc(q.examType)} 第${q.questionSeq}題</h2>`;
  html += `<div class="detail-meta">`;
  html += `<span><span class="key">考試：</span><span class="tag ${style.tag}">${q.examType}</span></span>`;
  html += `<span><span class="key">試年：</span>${esc(q.examYear)}</span>`;
  if (q.source) html += `<span><span class="key">出處：</span>${esc(q.source)}</span>`;
  html += `</div><div>`;
  for (const s of q.stocks) {
    html += `<div class="stock-detail-row"><div class="stock-num">第${s.seq}股</div><div class="stock-info">`;
    if (s.duke && s.duke !== '?') html += `<div class="code-line">${esc(s.duke)}${s.year!=='?'?s.year+'年':''}</div>`;
    html += `<div class="text-line">${esc(s.text)}</div></div></div>`;
  }
  html += `</div><div class="form-actions"><button class="btn" onclick="closeModal()">關閉</button><button class="btn btn-primary" onclick="closeModal();openEditForm(${q.id})">編輯此題</button></div>`;
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

// ===== Edit/Add =====
let editingId = null;
function buildFormHTML(q) {
  const isNew = !q;
  const title = isNew ? '新增題目' : `編輯題目 #${q.id}`;
  const examType = q ? q.examType : '會試';
  const stocks = q ? q.stocks : [{ seq: 1, code: '', duke: '', year: '', text: '', abbrev: '' }];
  const examTypes = ['會試','應天鄉試','順天鄉試','浙江鄉試','江西鄉試','福建鄉試','湖廣鄉試','河南鄉試','山東鄉試','山西鄉試','陝西鄉試','四川鄉試','廣東鄉試','廣西鄉試','雲貴鄉試','雲南鄉試','貴州鄉試'];
  let html = `<h2>${title}</h2>`;
  html += `<div class="form-row">
    <div class="form-group"><label>考試類別</label><select id="f-examType">${examTypes.map(t=>`<option ${examType===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="form-group"><label>試年</label><input id="f-examYear" value="${esc(q?q.examYear:'')}" placeholder="如：嘉靖二十年"></div>
    <div class="form-group"><label>科次</label><input id="f-session" type="number" value="${q?q.session||'':''}"></div>
    <div class="form-group"><label>題次</label><input id="f-questionSeq" type="number" min="1" max="4" value="${q?q.questionSeq||'':''}"></div>
  </div>`;
  html += `<div class="form-group"><label>出處</label><input id="f-source" value="${esc(q?q.source:'')}" placeholder="如：天一閣、世科錄"></div>`;
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:1rem 0 0.5rem"><label style="font-weight:600;color:var(--accent-light)">經文各股</label><button class="btn" onclick="addStockField()" type="button">+ 新增一股</button></div>`;
  html += `<div id="stocks-container">`;
  for (let i = 0; i < stocks.length; i++) html += stockFieldHTML(i, stocks[i]);
  html += `</div><div class="form-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveForm()">${isNew?'新增':'儲存'}</button></div>`;
  return html;
}
function stockFieldHTML(idx, s) {
  return `<div class="stock-editor" id="stock-${idx}">
    <div class="stock-header"><span>第 ${idx+1} 股</span><button class="remove-stock" onclick="removeStockField(${idx})">移除</button></div>
    <input type="hidden" class="sf-code" value="${esc(s.code||'')}">
    <div class="form-row">
      <div class="form-group"><label>時代</label><select class="sf-duke"><option value="">--</option>${['隱公','桓公','莊公','閔公','僖公','文公','宣公','成公','襄公','昭公','定公','哀公'].map(d=>`<option ${s.duke===d?'selected':''}>${d}</option>`).join('')}</select></div>
      <div class="form-group"><label>年份</label><input class="sf-year" type="number" value="${s.year&&s.year!=='?'?s.year:''}" placeholder="數字"></div>
    </div>
    <div class="form-group"><label>經文</label><textarea class="sf-text" rows="2" placeholder="經文全文">${esc(s.text||'')}</textarea></div>
  </div>`;
}
function openAddForm() { editingId=null; document.getElementById('modal-content').innerHTML=buildFormHTML(null); document.getElementById('modal-overlay').classList.add('show'); }
function openEditForm(id) { const q=DATA.find(x=>x.id===id); if(!q)return; editingId=id; document.getElementById('modal-content').innerHTML=buildFormHTML(q); document.getElementById('modal-overlay').classList.add('show'); }
function addStockField() { const c=document.getElementById('stocks-container'); const idx=c.children.length; const d=document.createElement('div'); d.innerHTML=stockFieldHTML(idx,{code:'',duke:'',year:'',text:''}); c.appendChild(d.firstElementChild); }
function removeStockField(idx) { const el=document.getElementById(`stock-${idx}`); if(el)el.remove(); Array.from(document.getElementById('stocks-container').children).forEach((child,i)=>{ child.id=`stock-${i}`; child.querySelector('.stock-header span').textContent=`第 ${i+1} 股`; child.querySelector('.remove-stock').setAttribute('onclick',`removeStockField(${i})`); }); }

function saveForm() {
  const examType=document.getElementById('f-examType').value, examYear=document.getElementById('f-examYear').value.trim();
  const session=parseInt(document.getElementById('f-session').value)||null, questionSeq=parseInt(document.getElementById('f-questionSeq').value)||null;
  const source=document.getElementById('f-source').value.trim();
  if(!examYear){toast('請填入試年');return;}
  const stockEls=document.getElementById('stocks-container').querySelectorAll('.stock-editor');
  const stocks=[];
  stockEls.forEach((el,i)=>{ const text=el.querySelector('.sf-text').value.trim(); if(!text)return; stocks.push({seq:i+1,code:el.querySelector('.sf-code').value.trim()||'',duke:el.querySelector('.sf-duke').value||'',year:parseInt(el.querySelector('.sf-year').value)||'',text,abbrev:''}); });
  if(!stocks.length){toast('請至少填入一股經文');return;}
  const fullText=stocks.map(s=>s.text).join('／');
  if(editingId){const q=DATA.find(x=>x.id===editingId);if(q){q.examType=examType;q.examYear=examYear;q.session=session;q.questionSeq=questionSeq;q.source=source;q.stocks=stocks;q.stockCount=stocks.length;q.fullText=fullText;q._edited=true;toast('已更新 #'+q.id);}}
  else{const newId=Math.max(0,...DATA.map(q=>q.id))+1;DATA.push({id:newId,examType,session,examYear,questionSeq,stockCount:stocks.length,fullText,source,stocks,_edited:true});toast('已新增 #'+newId);}
  markDirty();updateStats();applyFilters(false);closeModal();
}
function deleteQuestion(id){const q=DATA.find(x=>x.id===id);if(!q)return;if(!confirm(`確定刪除「${q.examYear} ${q.examType} 第${q.questionSeq}題」？`))return;DATA=DATA.filter(x=>x.id!==id);markDirty();updateStats();applyFilters(false);toast('已刪除 #'+id);}

// Export/Import
function exportJSON(){const clean=DATA.map(q=>{const c={...q};delete c._edited;return c;});const blob=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='春秋義題目資料庫.json';a.click();URL.revokeObjectURL(a.href);toast('已匯出 JSON');}
function exportCSV(){let csv='\uFEFF題號,考試類別,科次,試年,題次,股數,出處,題目全文\n';for(const q of DATA)csv+=[q.id,q.examType,q.session||'',q.examYear,q.questionSeq||'',q.stockCount,q.source||'','"'+q.fullText.replace(/"/g,'""')+'"'].join(',')+'\n';const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='春秋義題目資料庫.csv';a.click();URL.revokeObjectURL(a.href);toast('已匯出 CSV');}
function importJSON(){document.getElementById('import-file').click();}
function handleImport(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{const imported=JSON.parse(ev.target.result);if(!Array.isArray(imported))throw new Error();if(!confirm(`匯入 ${imported.length} 筆？將覆蓋現有資料。`))return;DATA=imported;markDirty();updateStats();applyFilters();toast(`已匯入 ${imported.length} 筆`);}catch(err){toast('匯入失敗');}};reader.readAsText(file);e.target.value='';}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}

// GitHub Sync
const GH_REPO='WangTingLin/ming-chunqiu-exam-db',GH_FILE='data.json';
function getGHToken(){return localStorage.getItem('gh_token');}
function setGHToken(t){localStorage.setItem('gh_token',t);}
function initSyncBtn(){const btn=document.getElementById('sync-btn');if(getGHToken()){btn.style.display='';}else{btn.style.display='';btn.textContent='設定 GitHub';btn.onclick=setupGitHub;}}
function setupGitHub(){const m=document.getElementById('modal-content');m.innerHTML=`<h2>設定 GitHub 同步</h2><p style="margin-bottom:1rem;line-height:1.8;color:var(--text-sec)">設定後可一鍵同步到 GitHub。</p><p style="margin-bottom:0.5rem;font-size:0.85rem;color:var(--text-dim)">請到 <a href="https://github.com/settings/tokens/new?scopes=repo&description=春秋義資料庫" target="_blank" style="color:var(--accent)">GitHub 建立 Token</a>（勾選 repo），貼到下方：</p><div class="form-group"><label>Token</label><input id="gh-token-input" type="password" placeholder="ghp_xxxxxxxxxxxx"></div><div class="form-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveGHToken()">儲存</button></div>`;document.getElementById('modal-overlay').classList.add('show');}
function saveGHToken(){const t=document.getElementById('gh-token-input').value.trim();if(!t){toast('請輸入 Token');return;}setGHToken(t);closeModal();const btn=document.getElementById('sync-btn');btn.textContent='同步 GitHub';btn.onclick=syncToGitHub;toast('已設定！');}
async function syncToGitHub(){const token=getGHToken();if(!token){setupGitHub();return;}const btn=document.getElementById('sync-btn');const orig=btn.textContent;btn.textContent='同步中...';btn.disabled=true;try{const gr=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}});if(gr.status===401){toast('Token 無效');setGHToken('');setupGitHub();return;}const fd=await gr.json();const clean=DATA.map(q=>{const c={...q};delete c._edited;return c;});const content=btoa(unescape(encodeURIComponent(JSON.stringify(clean,null,2))));const pr=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{method:'PUT',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify({message:'更新題目資料',content,sha:fd.sha})});if(pr.ok){DATA.forEach(q=>delete q._edited);dirty=false;document.getElementById('unsaved-badge').classList.remove('show');saveToLocal();render();toast('已同步！');}else{const err=await pr.json();toast('失敗：'+(err.message||''));}}catch(e){toast('失敗：'+e.message);}finally{btn.textContent=orig;btn.disabled=false;}}

// Events
document.getElementById('modal-overlay').addEventListener('click', function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown', e=>{if(e.key==='Escape')closeModal();});
document.getElementById('search').addEventListener('input', debounce(applyFilters, 300));
['filter-type','filter-duke'].forEach(id => document.getElementById(id).addEventListener('change', () => { applyFilters(); if(id==='filter-type') updateChipActive(document.getElementById('filter-type').value); }));
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.sort;
    if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applySort(); currentPage = 1; render();
  });
});

// Init
initSyncBtn();
const local = loadFromLocal();
if (local && local.length > 0) {
  DATA = local; updateStats(); filtered = [...DATA]; render();
  document.getElementById('unsaved-badge').classList.add('show');
} else {
  fetch('data.json').then(r => r.json()).then(data => {
    DATA = data; updateStats(); filtered = [...DATA]; render();
  }).catch(() => { document.getElementById('card-grid').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-dim)">載入失敗，請確認 data.json 存在。</div>'; });
}
</script>
</body>
</html>
